apiVersion: apps/v1
kind: Deployment
metadata:
  name: quest-frontend
  namespace: quest-management
  labels:
    app: quest-management
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quest-management
      component: frontend
  template:
    metadata:
      labels:
        app: quest-management
        component: frontend
    spec:
      containers:
      - name: quest-frontend
        image: quest-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        - name: REACT_APP_API_URL
          valueFrom:
            configMapKeyRef:
              name: quest-config
              key: REACT_APP_API_URL
        - name: REACT_APP_APP_NAME
          valueFrom:
            configMapKeyRef:
              name: quest-config
              key: REACT_APP_APP_NAME
        - name: REACT_APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: quest-config
              key: REACT_APP_VERSION
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-logs
          mountPath: /var/log/nginx
      volumes:
      - name: nginx-cache
        emptyDir:
          sizeLimit: 100Mi
      - name: nginx-logs
        persistentVolumeClaim:
          claimName: quest-frontend-logs-pvc
      restartPolicy: Always
      imagePullSecrets:
      - name: registry-secret
