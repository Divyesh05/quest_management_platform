apiVersion: v1
kind: ConfigMap
metadata:
  name: quest-config
  namespace: quest-management
  labels:
    app: quest-management
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  FRONTEND_URL: "https://questhub.example.com"
  SOCKET_CORS_ORIGIN: "https://questhub.example.com"
  REACT_APP_API_URL: "https://api.questhub.example.com"
  REACT_APP_APP_NAME: "QuestHub"
  REACT_APP_VERSION: "1.0.0"
  # Database configuration
  POSTGRES_DB: "quest_management"
  POSTGRES_USER: "quest_user"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  # Redis configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  # Application configuration
  APP_NAME: "QuestHub"
  APP_VERSION: "1.0.0"
  # Nginx configuration
  NGINX_WORKER_PROCESSES: "4"
  NGINX_WORKER_CONNECTIONS: "1024"
  # Rate limiting
  API_RATE_LIMIT: "10"
  LOGIN_RATE_LIMIT: "1"
