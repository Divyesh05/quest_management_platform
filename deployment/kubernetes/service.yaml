apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: quest-management
  labels:
    app: quest-management
    component: database
spec:
  selector:
    app: quest-management
    component: database
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
  type: ClusterIP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: quest-management
  labels:
    app: quest-management
    component: cache
spec:
  selector:
    app: quest-management
    component: cache
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  type: ClusterIP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: quest-management
  labels:
    app: quest-management
    component: backend
spec:
  selector:
    app: quest-management
    component: backend
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP
  type: ClusterIP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: quest-management
  labels:
    app: quest-management
    component: frontend
spec:
  selector:
    app: quest-management
    component: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP
  sessionAffinity: None
